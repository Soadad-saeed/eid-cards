<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة معايدة العيد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2D22;
    --emerald:#123524;
    --emerald-light:#1C5138;
    --gold:#C9A227;
    --gold-light:#E4C55E;
    --cream:#FAF7F0;
    --paper:#FFFFFF;
    --line:#E4DFD2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Cairo', sans-serif;
    background:
      radial-gradient(circle at 85% 0%, rgba(228,197,94,0.20), transparent 45%),
      radial-gradient(circle at 10% 100%, rgba(228,197,94,0.10), transparent 40%),
      var(--emerald);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--ink);
  }
  .stage{
    width:100%;
    max-width:520px;
  }
  .heading{
    text-align:center;
    color:var(--cream);
    margin-bottom:18px;
  }
  .heading h1{
    margin:0 0 6px;
    font-size:24px;
    font-weight:800;
  }
  .heading p{
    margin:0;
    font-size:13.5px;
    color:#CFE3D8;
  }
  .card-panel{
    background:var(--paper);
    border-radius:18px;
    padding:20px;
    box-shadow:0 20px 44px rgba(0,0,0,.28);
    border:1px solid var(--line);
  }
  #cardCanvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:10px;
    background:#eee;
  }
  .empty{
    padding:60px 20px;
    text-align:center;
    color:#8b8676;
    font-size:14px;
    line-height:1.9;
  }
  .field{
    margin-top:18px;
  }
  .field label{
    display:block;
    font-size:13px;
    font-weight:700;
    color:var(--emerald);
    margin-bottom:8px;
  }
  #nameInput{
    width:100%;
    font-family:inherit;
    font-size:16px;
    padding:13px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    text-align:center;
    transition:border-color .15s ease;
  }
  #nameInput:focus{
    outline:none;
    border-color:var(--gold);
  }
  .download-btn{
    margin-top:16px;
    width:100%;
    background:var(--gold);
    color:var(--emerald);
    border:none;
    padding:15px 16px;
    border-radius:11px;
    font-family:inherit;
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    transition:.15s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .download-btn:hover:not(:disabled){background:var(--gold-light); transform:translateY(-1px);}
  .download-btn:disabled{opacity:.45; cursor:not-allowed;}
  .foot-hint{
    margin-top:12px;
    text-align:center;
    font-size:11.5px;
    color:#a29d8c;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="heading">
    <h1>🌙 عيدكم مبارك</h1>
    <p>اكتب اسمك لتحصل على بطاقة معايدة خاصة بك</p>
  </div>

  <div class="card-panel">
    <canvas id="cardCanvas" style="display:none;"></canvas>
    <div class="empty" id="emptyMsg">
      لم يتم إعداد بطاقة معايدة بعد.<br>
      يرجى التواصل مع مسؤول النظام لإعداد القالب أولًا.
    </div>

    <div class="field" id="nameField" style="display:none;">
      <label>اكتب اسمك هنا</label>
      <input type="text" id="nameInput" placeholder="مثال: محمد الأحمد" maxlength="60" autocomplete="off">
    </div>

    <button class="download-btn" id="downloadBtn" style="display:none;" disabled>
      ⬇️ تحميل البطاقة
    </button>
    <div class="foot-hint" id="footHint" style="display:none;">
      سيتم تنزيل الصورة بجودة عالية على جهازك
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('cardCanvas');
const ctx = canvas.getContext('2d');
const emptyMsg = document.getElementById('emptyMsg');
const nameField = document.getElementById('nameField');
const nameInput = document.getElementById('nameInput');
const downloadBtn = document.getElementById('downloadBtn');
const footHint = document.getElementById('footHint');

let template = null;
let bgImage = null;

function loadTemplate() {
  const raw = localStorage.getItem('eidCardTemplate');
  if (!raw) return;
  try {
    template = JSON.parse(raw);
  } catch (e) {
    template = null;
  }
}

function init() {
  loadTemplate();
  if (!template) return; // keep empty state visible

  bgImage = new Image();
  bgImage.onload = () => {
    // Display canvas sized to fit the panel while keeping native aspect ratio.
    // We keep canvas INTERNAL resolution equal to the image's natural size,
    // so what the user sees is exactly what gets exported — high quality, no upscale blur.
    canvas.width = template.naturalWidth;
    canvas.height = template.naturalHeight;

    emptyMsg.style.display = 'none';
    canvas.style.display = 'block';
    nameField.style.display = 'block';
    downloadBtn.style.display = 'flex';
    footHint.style.display = 'block';

    // Preload font before first render to avoid fallback-font flash
    const fam = template.font.family.replace(/'/g, '');
    document.fonts.load(`${Math.max(12, Math.round(template.font.sizeRatio * canvas.height))}px ${fam}`)
      .catch(() => {})
      .finally(() => render(nameInput.value));
  };
  bgImage.src = template.image;
}

function render(name) {
  if (!template || !bgImage) return;
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(bgImage, 0, 0, w, h);

  const trimmed = (name || '').trim();
  if (!trimmed) {
    downloadBtn.disabled = true;
    return;
  }
  downloadBtn.disabled = false;

  const box = {
    x: template.box.xRatio * w,
    y: template.box.yRatio * h,
    w: template.box.wRatio * w,
    h: template.box.hRatio * h
  };

  const cx = box.x + box.w / 2;
  const cy = box.y + box.h / 2;

  const family = template.font.family;
  const weight = template.font.weight;
  const color = template.font.color;

  let fontSize = template.font.sizeRatio * h;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;

  // Auto-shrink the font so long names always stay centered and fully inside the box
  const maxTextWidth = box.w * 0.94;
  fontSize = fitFontToBox(trimmed, maxTextWidth, fontSize, weight, family, Math.max(8, h * 0.012));

  ctx.font = `${weight} ${fontSize}px ${family}`;
  ctx.fillText(trimmed, cx, cy);
}

function fitFontToBox(text, maxWidth, startSize, weight, family, minSize) {
  let size = startSize;
  ctx.font = `${weight} ${size}px ${family}`;
  while (ctx.measureText(text).width > maxWidth && size > minSize) {
    size -= Math.max(1, startSize * 0.01);
    ctx.font = `${weight} ${size}px ${family}`;
  }
  return size;
}

nameInput.addEventListener('input', () => render(nameInput.value));

downloadBtn.addEventListener('click', () => {
  if (downloadBtn.disabled) return;
  const link = document.createElement('a');
  const safeName = (nameInput.value || 'card').trim().replace(/[^\p{L}\p{N}\s-]/gu, '').replace(/\s+/g, '-');
  link.download = `بطاقة-معايدة-${safeName || 'موظف'}.png`;
  link.href = canvas.toDataURL('image/png', 1.0);
  link.click();
});

init();
</script>
</body>
</html>
